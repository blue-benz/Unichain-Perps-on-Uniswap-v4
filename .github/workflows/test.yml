name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

env:
  FOUNDRY_PROFILE: ci

jobs:
  foundry:
    name: Build, Test, Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Bootstrap and verify dependency pins
        run: ./scripts/bootstrap.sh

      - name: Build
        run: |
          forge --version
          forge build --sizes
        id: build

      - name: Test
        run: |
          forge test -vvv
        id: test

      - name: Fuzz Suite
        run: forge test --match-path "test/fuzz/*" -vvv

      - name: Coverage
        run: FOUNDRY_PROFILE=coverage forge coverage --report summary

      - name: Commit Policy Check
        run: ./scripts/verify_commits.sh 67
